name: Materialise premium visual refinement

on:
  push:
    branches:
      - visual/premium-pharma-refinement
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialise:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: visual/premium-pharma-refinement
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Generate and validate visual output
        run: |
          npm run build
          npm run visual:validate
      - name: Commit generated output
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Generated visual output is already current."
            exit 0
          fi
          git commit -m "Materialise premium visual refinement"
          git push origin HEAD:visual/premium-pharma-refinement

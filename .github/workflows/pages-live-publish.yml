name: Build, deploy and verify GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - .github/workflows/pages-live-publish.yml
      - scripts/stage-pages-artifact.mjs
      - package.json
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: novapharm-github-pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  LIVE_ORIGIN: https://novapharmhealthcare.com
  STATUS_CONTEXT: pages-live-publish

jobs:
  validate-release:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out proposed release
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Build and validate the public artifact
        run: |
          npm run build
          npm run test:owner-corrections
          npm run validate:domain
          node scripts/stage-pages-artifact.mjs _site

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
    steps:
      - name: Check out approved source
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Mark publication pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=pending \
            -f context="$STATUS_CONTEXT" \
            -f description="Building the owner-approved public release" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >/dev/null

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Build corrected public output
        run: npm run build

      - name: Validate owner corrections and public routes
        run: |
          npm run test:owner-corrections
          npm run validate:domain
          npm run check:links
          test "$(tr -d '\r\n' < CNAME)" = "novapharmhealthcare.com"

      - name: Stage a public-only Pages artifact
        run: node scripts/stage-pages-artifact.mjs _site

      - name: Configure Pages with an administration token when available
        if: env.PAGES_ADMIN_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.PAGES_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/pages" >/dev/null 2>&1; then
            gh api --method PUT "repos/$GITHUB_REPOSITORY/pages" --input - <<'JSON'
          {
            "build_type": "workflow",
            "cname": "novapharmhealthcare.com",
            "https_enforced": true
          }
          JSON
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/pages" --input - <<'JSON'
          {
            "build_type": "workflow"
          }
          JSON
            gh api --method PUT "repos/$GITHUB_REPOSITORY/pages" --input - <<'JSON'
          {
            "build_type": "workflow",
            "cname": "novapharmhealthcare.com",
            "https_enforced": true
          }
          JSON
          fi

      - name: Configure GitHub Pages metadata
        uses: actions/configure-pages@v5
        with:
          token: ${{ env.PAGES_ADMIN_TOKEN != '' && env.PAGES_ADMIN_TOKEN || github.token }}
          enablement: ${{ env.PAGES_ADMIN_TOKEN != '' }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          retention-days: 1

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the public artifact
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify the deployed Pages URL
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          cache_key="release-${GITHUB_SHA}-$(date +%s)"
          for attempt in $(seq 1 36); do
            curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              "${DEPLOYED_URL}?${cache_key}-${attempt}" > /tmp/deployed-home.html || true
            if grep -Fq 'Building a more resilient pharmaceutical supply network.' /tmp/deployed-home.html \
              && ! grep -Fq 'data-ai-search-open' /tmp/deployed-home.html \
              && ! grep -Fq 'Search &amp; Ask NovaPharm' /tmp/deployed-home.html; then
              echo "GitHub Pages artifact is deployed at ${DEPLOYED_URL}."
              exit 0
            fi
            sleep 10
          done
          echo "The Pages deployment URL did not serve the corrected release within six minutes." >&2
          exit 1

      - name: Verify the corrected release on the custom domain
        run: |
          set -euo pipefail
          cache_key="release-${GITHUB_SHA}-$(date +%s)"
          for attempt in $(seq 1 72); do
            echo "Custom-domain verification attempt $attempt"
            curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              -H 'Pragma: no-cache' \
              "$LIVE_ORIGIN/?${cache_key}-${attempt}" > /tmp/live-home.html || true
            curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              "$LIVE_ORIGIN/cro/?${cache_key}-${attempt}" > /tmp/live-cro.html || true
            curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              "$LIVE_ORIGIN/oncology/?${cache_key}-${attempt}" > /tmp/live-oncology.html || true
            search_status=$(curl --silent --output /dev/null --write-out '%{http_code}' --location "$LIVE_ORIGIN/search/?${cache_key}-${attempt}" || true)
            ai_status=$(curl --silent --output /dev/null --write-out '%{http_code}' --location "$LIVE_ORIGIN/technology/ai-governance/?${cache_key}-${attempt}" || true)

            if grep -Fq 'Building a more resilient pharmaceutical supply network.' /tmp/live-home.html \
              && ! grep -Fq 'data-ai-search-open' /tmp/live-home.html \
              && ! grep -Fq 'Search &amp; Ask NovaPharm' /tmp/live-home.html \
              && grep -Fq 'Prabhakar Vitthal Lahare' /tmp/live-cro.html \
              && grep -Fq 'oncology-editorial-gallery' /tmp/live-oncology.html \
              && [ "$search_status" = "404" ] \
              && [ "$ai_status" = "404" ]; then
              echo "The owner-corrected public release is live at $LIVE_ORIGIN."
              exit 0
            fi
            sleep 10
          done
          echo "The custom domain did not serve the complete corrected release within 12 minutes." >&2
          exit 1

      - name: Mark publication successful
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=success \
            -f context="$STATUS_CONTEXT" \
            -f description="Corrected NovaPharm public release is live and verified" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >/dev/null

      - name: Mark publication failed
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=failure \
            -f context="$STATUS_CONTEXT" \
            -f description="Pages artifact deployment or custom-domain verification failed" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >/dev/null

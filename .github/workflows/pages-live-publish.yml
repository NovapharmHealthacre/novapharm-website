name: Build, publish and verify GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  statuses: write

concurrency:
  group: novapharm-github-pages-live
  cancel-in-progress: false

jobs:
  build-publish-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      LIVE_ORIGIN: https://novapharmhealthcare.com
      STATUS_CONTEXT: pages-live-publish
    steps:
      - name: Check out approved source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Mark publication pending
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=pending \
            -f context="$STATUS_CONTEXT" \
            -f description="Building the owner-approved public release" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >/dev/null

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Build corrected public output
        run: npm run build

      - name: Validate owner corrections
        run: npm run test:owner-corrections

      - name: Validate domain and public routes
        run: |
          npm run validate:domain
          npm run check:links
          test "$(tr -d '\r\n' < CNAME)" = "novapharmhealthcare.com"

      - name: Synchronise generated public output to main
        id: sync
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated-output changes require synchronisation."
          else
            git commit -m "Synchronise owner-approved public release [skip ci]"
            git push origin HEAD:main
          fi
          echo "publish_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Inspect GitHub Pages configuration and DNS health
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/pages" > /tmp/pages-site.json
          jq '{html_url, cname, status, source, build_type, https_enforced, protected_domain_state, https_certificate}' /tmp/pages-site.json
          jq -e '.cname == "novapharmhealthcare.com"' /tmp/pages-site.json >/dev/null
          gh api "repos/$GITHUB_REPOSITORY/pages/health" > /tmp/pages-dns-health.json
          jq . /tmp/pages-dns-health.json

      - name: Request a fresh branch-based Pages build
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/pages/builds" > /tmp/pages-build-request.json
          cat /tmp/pages-build-request.json

      - name: Wait for Pages to build the synchronised commit
        env:
          PUBLISH_SHA: ${{ steps.sync.outputs.publish_sha }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 72); do
            gh api "repos/$GITHUB_REPOSITORY/pages/builds/latest" > /tmp/pages-build-latest.json
            status=$(jq -r '.status // "unknown"' /tmp/pages-build-latest.json)
            commit=$(jq -r '.commit // ""' /tmp/pages-build-latest.json)
            echo "Pages build attempt $attempt: status=$status commit=$commit expected=$PUBLISH_SHA"
            if [ "$status" = "built" ] && [ "$commit" = "$PUBLISH_SHA" ]; then
              exit 0
            fi
            if [ "$status" = "errored" ]; then
              jq . /tmp/pages-build-latest.json
              exit 1
            fi
            sleep 10
          done
          echo "Pages did not build the synchronised commit within 12 minutes." >&2
          exit 1

      - name: Verify corrected release on the public domain
        env:
          PUBLISH_SHA: ${{ steps.sync.outputs.publish_sha }}
        run: |
          set -euo pipefail
          cache_key="release-${PUBLISH_SHA}-$(date +%s)"
          for attempt in $(seq 1 72); do
            echo "Live verification attempt $attempt"
            curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              -H 'Pragma: no-cache' \
              "$LIVE_ORIGIN/?${cache_key}-${attempt}" > /tmp/live-home.html || true
            curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              "$LIVE_ORIGIN/cro/?${cache_key}-${attempt}" > /tmp/live-cro.html || true
            curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              "$LIVE_ORIGIN/oncology/?${cache_key}-${attempt}" > /tmp/live-oncology.html || true
            search_status=$(curl --silent --output /dev/null --write-out '%{http_code}' --location "$LIVE_ORIGIN/search/?${cache_key}-${attempt}" || true)
            ai_status=$(curl --silent --output /dev/null --write-out '%{http_code}' --location "$LIVE_ORIGIN/technology/ai-governance/?${cache_key}-${attempt}" || true)

            if grep -Fq 'Building a more resilient pharmaceutical supply network.' /tmp/live-home.html \
              && ! grep -Fq 'data-ai-search-open' /tmp/live-home.html \
              && ! grep -Fq 'Search &amp; Ask NovaPharm' /tmp/live-home.html \
              && grep -Fq 'Prabhakar Vitthal Lahare' /tmp/live-cro.html \
              && grep -Fq 'oncology-editorial-gallery' /tmp/live-oncology.html \
              && [ "$search_status" = "404" ] \
              && [ "$ai_status" = "404" ]; then
              echo "The owner-corrected public release is live at $LIVE_ORIGIN."
              exit 0
            fi
            sleep 10
          done
          echo "The public domain did not serve the complete corrected release within 12 minutes." >&2
          exit 1

      - name: Mark publication successful
        if: success()
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=success \
            -f context="$STATUS_CONTEXT" \
            -f description="Corrected NovaPharm public release is live and verified" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >/dev/null

      - name: Mark publication failed
        if: failure()
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=failure \
            -f context="$STATUS_CONTEXT" \
            -f description="Public build, Pages publication or live verification failed" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >/dev/null

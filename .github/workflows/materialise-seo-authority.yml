name: Materialise SEO authority output

on:
  push:
    branches:
      - seo/authority-knowledge-graph
    paths:
      - "src/content/**"
      - "src/seo/**"
      - "scripts/build-site.mjs"
      - "scripts/enhance-seo-authority.mjs"
      - "scripts/reconcile-article-authority.mjs"
      - "scripts/validate-seo-authority.mjs"
      - "assets/js/marketing-attribution.js"
      - "seo/**"
      - "package.json"
      - ".github/workflows/materialise-seo-authority.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialise-seo-authority-${{ github.ref }}
  cancel-in-progress: false

jobs:
  materialise:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: seo/authority-knowledge-graph
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install exact dependencies
        run: npm ci --ignore-scripts
      - name: Generate public authority output
        run: npm run build
      - name: Validate generated output
        run: npm run seo:validate
      - name: Commit deterministic generated files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Generated output is already current."
            exit 0
          fi
          git commit -m "Materialise SEO authority output"
          git push origin HEAD:seo/authority-knowledge-graph

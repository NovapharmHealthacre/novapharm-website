name: Premium visual refinement validation

on:
  pull_request:
    paths:
      - "assets/css/**"
      - "assets/js/**"
      - "scripts/build-site.mjs"
      - "scripts/apply-visual-refinement.mjs"
      - "scripts/validate-visual-refinement.mjs"
      - "services/**"
      - "regulatory-services/**"
      - "partner-with-us/**"
      - "technology/**"
      - "leadership/**"
      - "index.html"
      - "package.json"
      - ".github/workflows/visual-refinement.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install exact dependencies
        run: npm ci --ignore-scripts
      - name: Build the deterministic visual release
        run: npm run build
      - name: Validate the sixteen-module implementation
        run: npm run visual:validate
      - name: Confirm generated output is committed
        run: git diff --exit-code

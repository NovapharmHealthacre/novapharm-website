name: Production readiness

on:
  pull_request:
  push:
    branches: [main, "codex/**"]

permissions:
  contents: read

concurrency:
  group: novapharm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
        env:
          NODE_ENV: test
          SESSION_SECRET: github-actions-test-session-secret-32-characters
          PORTAL_USERNAME: IntegrationAdmin
          PORTAL_PASSWORD: Test-Only-Strong-Password-9

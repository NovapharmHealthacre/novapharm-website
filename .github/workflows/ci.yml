name: Production readiness

on:
  pull_request:
  push:
    branches: [main, "codex/**"]

permissions:
  contents: read

concurrency:
  group: novapharm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install exact dependencies
        run: npm ci --ignore-scripts
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Run production readiness suite
        id: readiness
        continue-on-error: true
        run: |
          set -o pipefail
          npm run check 2>&1 | tee /tmp/production-readiness.log
      - name: Upload readiness diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-log
          path: /tmp/production-readiness.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce readiness result
        if: steps.readiness.outcome != 'success'
        run: exit 1

name: Update Azure dependency lock

on:
  workflow_dispatch:
  push:
    branches:
      - codex/azure-production-platform
    paths:
      - package.json
      - .github/workflows/update-azure-dependency-lock.yml

permissions:
  contents: write

concurrency:
  group: azure-dependency-lock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Resolve pinned runtime dependencies
        run: npm install --package-lock-only --ignore-scripts
      - name: Verify clean install
        run: npm ci --ignore-scripts
      - name: Commit the verified lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Lock Azure production dependencies"
          git push origin HEAD:${{ github.ref_name }}

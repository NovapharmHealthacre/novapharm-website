name: Chromium and WebKit acceptance

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: novapharm-browser-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit
      - name: Build website
        run: npm run build
      - name: Prepare and start protected synthetic validation server
        run: node scripts/start-browser-validation.mjs "$RUNNER_TEMP/novapharm-browser"
      - name: Run backend browser workflows
        env:
          VISUAL_BASE_URL: http://127.0.0.1:4178
          VISUAL_CREDENTIALS_PATH: ${{ runner.temp }}/novapharm-browser/credentials.json
        run: npm run test:browser-workflows
      - name: Run Chromium and WebKit matrix
        env:
          VISUAL_BASE_URL: http://127.0.0.1:4178
          VISUAL_CREDENTIALS_PATH: ${{ runner.temp }}/novapharm-browser/credentials.json
          VISUAL_OUTPUT_ROOT: artifacts/visual-acceptance
        run: npm run test:browser-acceptance
      - name: Upload rendered evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-acceptance-${{ github.sha }}
          path: artifacts/visual-acceptance
          if-no-files-found: error
          retention-days: 7
      - name: Stop and remove synthetic runtime
        if: always()
        run: |
          node scripts/stop-browser-validation.mjs "$RUNNER_TEMP/novapharm-browser" || true
          rm -rf "$RUNNER_TEMP/novapharm-browser"

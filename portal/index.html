<!DOCTYPE html><html lang="en-GB" data-api-base=""><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Secure Portal Login | NovaPharm Healthcare</title><link rel="icon" href="/assets/brand/novapharm-healthcare-logo.svg" type="image/svg+xml"><link rel="stylesheet" href="/assets/css/novapharm.css"><script type="module" src="/assets/js/cookie-consent.js"></script></head><body class="login-page"><main class="login-panel"><div class="login-logo"><picture class="brand-logo"><source srcset="/assets/brand/novapharm-healthcare-logo.svg" type="image/svg+xml"><img src="/assets/brand/novapharm-healthcare-logo.png" alt="NovaPharm Healthcare" width="320" height="40" fetchpriority="high" decoding="async"></picture></div><span class="section-kicker">Private access</span><h1>NovaPharm Secure Portal</h1><p>Choose your authorised access area and sign in. Customer, employee, board and administrator information remains locked until the secure backend verifies your session and permissions.</p><form class="form-grid" data-login-form><fieldset class="portal-access"><legend>Portal access</legend><label><input type="radio" name="accessType" value="customer" checked><span><strong>Customer</strong><small>Orders, invoices, statements and documents</small></span></label><label><input type="radio" name="accessType" value="employee"><span><strong>Employee</strong><small>Operations, products, purchasing and CRM</small></span></label><label><input type="radio" name="accessType" value="board"><span><strong>Board member</strong><small>Executive Platform and CEO dashboard</small></span></label><label><input type="radio" name="accessType" value="admin"><span><strong>Administrator</strong><small>Users, content, analytics and platform controls</small></span></label></fieldset><div class="form-row"><div class="field"><label for="username">Username</label><input id="username" name="username" autocomplete="username" required></div><div class="field"><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required></div></div><button class="btn btn-primary" type="submit">Sign in securely</button><div class="alert" data-login-status>Credentials and portal permissions are verified server-side.</div></form><button class="inline-link-button portal-cookie-settings" type="button" data-cookie-settings>Cookie settings</button></main><script src="/assets/js/api-client.js" defer></script><script src="/assets/js/portal-login.js" defer></script></body></html>
